<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMS Login</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0d1a;
            font-family: Arial, sans-serif;
        }

        .login-box {
            width: 380px;
            background: #12122a;
            border: 1px solid #2e2e4e;
            border-radius: 12px;
            padding: 36px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        .login-box h1 {
            margin: 0 0 8px;
            color: #a78bfa;
            font-size: 24px;
        }

        .subtitle {
            color: #8b8ba7;
            font-size: 13px;
            margin-bottom: 24px;
        }

        .login-error,
        .login-success {
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .login-error {
            display: none;
            background: #2a1a1a;
            border: 1px solid #f87171;
            color: #f87171;
        }

        .login-success {
            display: none;
            background: #1a2a1a;
            border: 1px solid #34d399;
            color: #34d399;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #cfcfe8;
        }

        .form-control {
            width: 100%;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid #3a3a5c;
            background: #1a1a2e;
            color: #fff;
            padding: 12px 14px;
            font-size: 14px;
            outline: none;
        }

        .form-control:focus {
            border-color: #a78bfa;
        }

        .btn-login {
            width: 100%;
            border: 1px solid #a78bfa;
            background: #6d28d9;
            color: white;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #7c3aed;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h1>🛒 Order Management</h1>
    <div class="subtitle">Customer Support Dashboard — Sign In</div>

    <div id="loginError" class="login-error">
        Invalid username or password.
    </div>

    <div id="loginSuccess" class="login-success">
        You have been logged out.
    </div>

    <form method="post" action="/login">
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required autofocus>
        </div>

        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn-login">🔐 Sign In</button>
    </form>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    if (params.has('error')) {
        document.getElementById('loginError').style.display = 'block';
    }
    if (params.has('logout')) {
        document.getElementById('loginSuccess').style.display = 'block';
    }
</script>
</body>
</html>
